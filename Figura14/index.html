<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfico de Dispersión Animado</title>
  <style>
    body {
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
    }

    /* 1. Animación de Látigo / Elastic Entrante */
    @keyframes whipIn {
      0% {
        opacity: 0;
        transform: translateX(-100vw) rotate(-10deg) scale(0.6);
      }
      60% {
        opacity: 1;
        transform: translateX(30px) rotate(3deg) scale(1.05);
      }
      80% {
        transform: translateX(-10px) rotate(-1deg) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateX(0) rotate(0deg) scale(1);
      }
    }

    /* Contenedor principal con animación de látigo */
    .card {
      background-color: #232325;
      border-radius: 20px;
      padding: 24px;
      width: 520px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;

      /* Aplicación de la animación de látigo */
      animation: whipIn 1.1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    /* Título */
    .title {
      color: #ffffff;
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* Marco del área del gráfico */
    .chart-container {
      border: 1px solid #48484a;
      border-radius: 12px;
      padding: 30px;
      background-color: #28282a;
      width: 100%;
      box-sizing: border-box;
    }

    /* SVG */
    svg {
      width: 100%;
      height: 260px;
      display: block;
      overflow: visible;
    }

    /* Estilos de cuadrícula y ejes */
    .grid-line {
      stroke: #38383a;
      stroke-width: 1;
    }

    .axis-line {
      stroke: #7c7c7e;
      stroke-width: 1.5;
    }

    /* 2. Animaciones para los puntos */
    
    /* Entrada tipo pop-in secuencial */
    @keyframes pointPop {
      0% {
        opacity: 0;
        transform: scale(0);
      }
      70% {
        opacity: 1;
        transform: scale(1.4);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Parpadeo / Pulso de brillo constante */
    @keyframes pointGlowPulse {
      0%, 100% {
        opacity: 1;
        filter: drop-shadow(0px 0px 4px rgba(255, 255, 255, 0.6)) 
                drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.3));
      }
      50% {
        opacity: 0.4;
        filter: drop-shadow(0px 0px 12px rgba(255, 255, 255, 1)) 
                drop-shadow(0px 0px 22px rgba(255, 255, 255, 0.9));
      }
    }

    /* Clases de animación combinadas en los puntos */
    .point {
      fill: #ffffff;
      transform-origin: center;
      opacity: 0; /* Ocultos al inicio */

      /* Ejecuta entrada 'pointPop' y luego el parpadeo 'pointGlowPulse' */
      animation: 
        pointPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
        pointGlowPulse 2s ease-in-out infinite 1.2s;
    }

    /* Retrasos secuenciales (Aparecen uno por uno) */
    .p1 { animation-delay: 1.2s, 1.7s; transform-box: fill-box; }
    .p2 { animation-delay: 1.5s, 2.0s; transform-box: fill-box; }
    .p3 { animation-delay: 1.8s, 2.3s; transform-box: fill-box; }
    .p4 { animation-delay: 2.1s, 2.6s; transform-box: fill-box; }
    .p5 { animation-delay: 2.4s, 2.9s; transform-box: fill-box; }
    .p6 { animation-delay: 2.7s, 3.2s; transform-box: fill-box; }

  </style>
</head>
<body>

  <div class="card">
    <div class="title">Gráfico de Dispersión</div>
    
    <div class="chart-container">
      <svg viewBox="0 0 450 250">
        <!-- Marcador para flechas en los ejes -->
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#7c7c7e" />
          </marker>
        </defs>

        <!-- Líneas Verticales de la Cuadrícula -->
        <line x1="100" y1="20" x2="100" y2="220" class="grid-line" />
        <line x1="150" y1="20" x2="150" y2="220" class="grid-line" />
        <line x1="200" y1="20" x2="200" y2="220" class="grid-line" />
        <line x1="250" y1="20" x2="250" y2="220" class="grid-line" />
        <line x1="300" y1="20" x2="300" y2="220" class="grid-line" />
        <line x1="350" y1="20" x2="350" y2="220" class="grid-line" />
        <line x1="400" y1="20" x2="400" y2="220" class="grid-line" />

        <!-- Líneas Horizontales de la Cuadrícula -->
        <line x1="40" y1="40" x2="420" y2="40" class="grid-line" />
        <line x1="40" y1="85" x2="420" y2="85" class="grid-line" />
        <line x1="40" y1="130" x2="420" y2="130" class="grid-line" />
        <line x1="40" y1="175" x2="420" y2="175" class="grid-line" />

        <!-- Eje Y (Vertical) -->
        <line x1="50" y1="230" x2="50" y2="25" class="axis-line" marker-end="url(#arrow)" />

        <!-- Eje X (Horizontal) -->
        <line x1="40" y1="220" x2="425" y2="220" class="axis-line" marker-end="url(#arrow)" />

        <!-- Puntos del gráfico con sus respectivas clases de animación secuencial -->
        <circle cx="100" cy="130" r="7" class="point p1" />
        <circle cx="130" cy="95"  r="7" class="point p2" />
        <circle cx="170" cy="50"  r="7" class="point p3" />
        <circle cx="160" cy="130" r="7" class="point p4" />
        <circle cx="180" cy="180" r="7" class="point p5" />
        <circle cx="230" cy="95"  r="7" class="point p6" />
      </svg>
    </div>
  </div>

</body>
</html>
