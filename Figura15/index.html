<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histograma Animado</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    /* Animación de Látigo / Whip con efecto elástico para la tarjeta */
    @keyframes whipEnter {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(-12deg) translateY(100px);
      }
      50% {
        opacity: 1;
        transform: scale(1.08) rotate(3deg) translateY(-10px);
      }
      70% {
        transform: scale(0.96) rotate(-1deg) translateY(4px);
      }
      85% {
        transform: scale(1.02) rotate(0.5deg) translateY(-2px);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg) translateY(0);
      }
    }

    /* Animación de crecimiento para las barras */
    @keyframes growUp {
      from {
        height: 0%;
      }
    }

    /* Keyframe para la aparición suave de las etiquetas del eje X */
    @keyframes fadeIn {
      from { 
        opacity: 0; 
        transform: translateY(6px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    /* Contenedor Principal */
    .card {
      background-color: #242424;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: whipEnter 1.1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      transform-origin: center bottom;
    }

    .title {
      color: #ffffff;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* Marco Interno con Bordes Redondeados */
    .chart-container {
      border: 1px solid #3d3d3d;
      border-radius: 16px;
      padding: 30px 20px 20px 20px;
      background-color: #242424;
      position: relative;
    }

    /* Red de Cuadrícula (Grid Background) */
    .chart-grid {
      position: relative;
      width: 100%;
      height: 320px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 10% 16.666%;
      display: flex;
      align-items: flex-end;
    }

    /* Eje Y (Flecha Vertical) */
    .y-axis {
      position: absolute;
      left: 10%;
      bottom: 25px;
      top: 10px;
      width: 2px;
      background-color: #7a7a7a;
      z-index: 2;
    }

    .y-axis::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -5px;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 10px solid #7a7a7a;
    }

    /* Eje X (Flecha Horizontal) */
    .x-axis {
      position: absolute;
      left: 6%;
      right: 15px;
      bottom: 35px;
      height: 2px;
      background-color: #7a7a7a;
      z-index: 2;
    }

    .x-axis::after {
      content: '';
      position: absolute;
      right: -2px;
      top: -5px;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid #7a7a7a;
    }

    /* Áreas de Barras */
    .bars-container {
      position: absolute;
      left: 18%;
      right: 10%;
      bottom: 37px;
      height: calc(100% - 37px);
      display: flex;
      align-items: flex-end;
      gap: 12px;
      z-index: 1;
    }

    .bar-wrapper {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
    }

    /* Configuración Base para las Barras Animadas */
    .bar {
      width: 100%;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      transition: opacity 0.2s ease, transform 0.2s ease;
      animation-name: growUp;
      animation-duration: 1.1s;
      animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
      animation-fill-mode: backwards;
    }

    .bar:hover {
      opacity: 0.9;
      transform: scaleY(1.02);
    }

    /* Configuración individual de Altura, Color y Tiempos de Animación (Desfases) */
    .bar-1 {
      height: 30%;
      background: linear-gradient(180deg, #aa22d6 0%, #7b00a8 100%);
      animation-delay: 0.8s;
    }

    .bar-2 {
      height: 55%;
      background: linear-gradient(180deg, #007bff 0%, #0056b3 100%);
      animation-delay: 0.95s;
    }

    .bar-3 {
      height: 80%;
      background: linear-gradient(180deg, #28a745 0%, #1e7e34 100%);
      animation-delay: 1.1s;
    }

    .bar-4 {
      height: 48%;
      background: linear-gradient(180deg, #b04100 0%, #6d2800 100%);
      animation-delay: 1.25s;
    }

    /* Etiquetas del Eje X */
    .x-labels {
      position: absolute;
      left: 18%;
      right: 10%;
      bottom: 8px;
      display: flex;
      gap: 12px;
      z-index: 3;
    }

    .label {
      flex: 1;
      text-align: center;
      color: #b3b3b3;
      font-size: 0.95rem;
      font-weight: 500;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1.4s;
      opacity: 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1 class="title">Histograma</h1>
    
    <div class="chart-container">
      <div class="chart-grid">
        <!-- Ejes del Gráfico -->
        <div class="y-axis"></div>
        <div class="x-axis"></div>

        <!-- Contenedor de las Barras -->
        <div class="bars-container">
          <div class="bar-wrapper">
            <div class="bar bar-1"></div>
          </div>
          <div class="bar-wrapper">
            <div class="bar bar-2"></div>
          </div>
          <div class="bar-wrapper">
            <div class="bar bar-3"></div>
          </div>
          <div class="bar-wrapper">
            <div class="bar bar-4"></div>
          </div>
        </div>

        <!-- Leyendas del Eje X -->
        <div class="x-labels">
          <div class="label">0 – 10</div>
          <div class="label">10 – 20</div>
          <div class="label">20 – 30</div>
          <div class="label">30 – 40</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
