<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barras de Progreso Animadas con Porcentajes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    /* -------------------------------------------------------------
       ANIMACIÓN DE ENTRADA CON EFECTO LÁTIGO (WHIP / BOUNCE)
    ------------------------------------------------------------- */
    @keyframes whipIn {
      0% {
        opacity: 0;
        transform: scale(0.3) translateY(120px) rotate(-4deg);
      }
      60% {
        opacity: 1;
        transform: scale(1.05) translateY(-10px) rotate(1deg);
      }
      80% {
        transform: scale(0.98) translateY(4px) rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0) rotate(0deg);
      }
    }

    /* Contenedor Principal */
    .card-container {
      background-color: #222222;
      border: 1px solid #444444;
      border-radius: 16px;
      padding: 30px 40px;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
      
      /* Aplicación del efecto látigo */
      animation: whipIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Fila de Datos */
    .data-row {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    .number {
      color: #7a7a7a;
      font-size: 1.5rem;
      font-weight: 300;
      width: 20px;
      text-align: right;
    }

    .label {
      color: #e0e0e0;
      font-size: 1.4rem;
      font-weight: 400;
      width: 90px;
    }

    /* Track de la Barra */
    .bar-track {
      position: relative;
      flex: 1;
      height: 42px;
      background-color: #2b2b2b;
      border: 1px solid #555555;
      border-radius: 21px;
      overflow: visible;
    }

    /* Relleno de la Barra */
    .bar-fill {
      position: relative;
      height: 100%;
      border-radius: 21px;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 0%; /* Inicia en 0% para la animación */
      transition: width 1.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Divisiones verticales (ticks) */
    .tick {
      width: 1px;
      height: 60%;
      background-color: rgba(255, 255, 255, 0.25);
      flex-shrink: 0;
    }

    /* Tooltip / Etiqueta Flotante con el Porcentaje */
    .tooltip {
      position: absolute;
      top: -30px;
      right: 0;
      transform: translateX(50%);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid currentColor;
      background-color: #222222;
      white-space: nowrap;
      z-index: 10;
    }

    /* Flechita del tooltip */
    .tooltip::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px 5px 0;
      border-style: solid;
      border-color: currentColor transparent transparent transparent;
    }

    /* --- ESTILOS ESPECÍFICOS Y COLORES POR DATO --- */

    /* Dato 1 - Cyan/Azul */
    .row-1 .bar-fill {
      background: linear-gradient(90deg, #1b5e71 0%, #369ab0 100%);
    }
    .row-1 .tooltip {
      color: #4db6ac;
      border-color: #4db6ac;
    }

    /* Dato 2 - Verde */
    .row-2 .bar-fill {
      background: linear-gradient(90deg, #135d33 0%, #228b4d 100%);
    }
    .row-2 .tooltip {
      color: #52b788;
      border-color: #52b788;
    }

    /* Dato 3 - Rojo/Carmín */
    .row-3 .bar-fill {
      background: linear-gradient(90deg, #741123 0%, #b8253b 100%);
    }
    .row-3 .tooltip {
      color: #e63946;
      border-color: #e63946;
    }
  </style>
</head>
<body>

  <div class="card-container">
    
    <!-- Fila 1 -->
    <div class="data-row row-1">
      <span class="number">1</span>
      <span class="label">Dato 1</span>
      <div class="bar-track">
        <div class="bar-fill" data-target="70.0">
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          
          <div class="tooltip"><span class="percent-val">0.0</span>%</div>
        </div>
      </div>
    </div>

    <!-- Fila 2 -->
    <div class="data-row row-2">
      <span class="number">2</span>
      <span class="label">Dato 2</span>
      <div class="bar-track">
        <div class="bar-fill" data-target="45.0">
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          
          <div class="tooltip"><span class="percent-val">0.0</span>%</div>
        </div>
      </div>
    </div>

    <!-- Fila 3 -->
    <div class="data-row row-3">
      <span class="number">3</span>
      <span class="label">Dato 3</span>
      <div class="bar-track">
        <div class="bar-fill" data-target="88.0">
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>
          <span class="tick"></span>

          <div class="tooltip"><span class="percent-val">0.0</span>%</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Esperamos a que la animación de entrada (látigo) golpee para iniciar la barra y el conteo
      setTimeout(() => {
        const bars = document.querySelectorAll('.bar-fill');
        const duration = 1800; // 1.8 segundos de animación

        bars.forEach(bar => {
          const targetValue = parseFloat(bar.getAttribute('data-target'));
          const percentVal = bar.querySelector('.percent-val');
          
          // 1. Iniciar la expansión visual de la barra de 0% a X%
          bar.style.width = targetValue + '%';

          // 2. Animar los porcentajes en texto sincrónicamente
          let startTime = null;

          function animatePercentage(currentTime) {
            if (!startTime) startTime = currentTime;
            const elapsedTime = currentTime - startTime;
            const progress = Math.min(elapsedTime / duration, 1);
            
            // Función para suavizar la aceleración/frenado del contador (Ease Out Quad)
            const easeProgress = 1 - (1 - progress) * (1 - progress);
            
            // Cálculo del valor actual con un decimal
            const currentPercentage = (easeProgress * targetValue).toFixed(1);
            percentVal.textContent = currentPercentage;

            if (progress < 1) {
              requestAnimationFrame(animatePercentage);
            } else {
              percentVal.textContent = targetValue.toFixed(1);
            }
          }

          requestAnimationFrame(animatePercentage);
        });
      }, 400); // Retraso para acoplarlo al impacto del látigo
    });
  </script>

</body>
</html>
