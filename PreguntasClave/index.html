<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas Interactivas</title>
  
  <!-- Tipografía Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-color: #f1f5f9;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --font-main: 'Poppins', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 2rem;
    }

    /* Fondo animado sutil */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      animation: float 10s infinite alternate ease-in-out;
    }

    body::before {
      background: #6366f1;
      top: 15%;
      left: 20%;
    }

    body::after {
      background: #a855f7;
      bottom: 15%;
      right: 20%;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Contenedor Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.75rem;
      max-width: 900px;
      width: 100%;
      perspective: 1000px;
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Estilos de Tarjeta */
    .card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2.2rem 2rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      cursor: pointer;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.2s ease-out, border-color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    /* Brillo dinámico que sigue al mouse */
    .card::before {
      content: '';
      position: absolute;
      top: var(--mouse-y, 50%);
      left: var(--mouse-x, 50%);
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 20px 40px -15px rgba(99, 102, 241, 0.3);
    }

    /* Borde luminoso decorativo lateral */
    .card-indicator {
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 4px;
      background: linear-gradient(180deg, #6366f1, #a855f7);
      border-radius: 0 4px 4px 0;
      opacity: 0.6;
      transition: opacity 0.3s ease, height 0.3s ease, top 0.3s ease;
    }

    .card:hover .card-indicator {
      opacity: 1;
      height: 80%;
      top: 10%;
    }

    /* Texto */
    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #ffffff;
      transform: translateZ(25px);
      letter-spacing: -0.01em;
      transition: color 0.3s ease;
    }

    .card:hover .card-title {
      color: #e2e8f0;
    }

    /* Efecto Ripple al hacer clic */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: ripple-animation 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple-animation {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="cards-grid">
    
    <div class="card">
      <div class="card-indicator"></div>
      <h3 class="card-title">¿Qué ocurrió?</h3>
    </div>

    <div class="card">
      <div class="card-indicator"></div>
      <h3 class="card-title">¿Por qué ocurrió?</h3>
    </div>

    <div class="card">
      <div class="card-indicator"></div>
      <h3 class="card-title">¿Qué podría ocurrir?</h3>
    </div>

    <div class="card">
      <div class="card-indicator"></div>
      <h3 class="card-title">¿Qué decisión se debería tomar?</h3>
    </div>

  </div>

  <script>
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      // Movimiento 3D Tilt y posición del reflejo según el cursor
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Actualizar variables CSS para la luz direccional
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);

        // Cálculo de inclinación 3D
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -10;
        const rotateY = ((x - centerX) / centerX) * 10;

        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
      });

      // Restaurar posición original al salir
      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px)';
      });

      // Efecto Onda (Ripple) al hacer clic
      card.addEventListener('click', (e) => {
        const rect = card.getBoundingClientRect();
        const circle = document.createElement('span');
        const diameter = Math.max(rect.width, rect.height);
        const radius = diameter / 2;

        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${e.clientX - rect.left - radius}px`;
        circle.style.top = `${e.clientY - rect.top - radius}px`;
        circle.classList.add('ripple');

        const ripple = card.querySelector('.ripple');
        if (ripple) {
          ripple.remove();
        }

        card.appendChild(circle);
      });
    });
  </script>
</body>
</html>
